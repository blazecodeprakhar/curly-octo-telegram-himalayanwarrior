[build]
  command = "npm run build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "20"
  NEXT_TELEMETRY_DISABLED = "1"

# @netlify/plugin-nextjs v5+ handles ALL routing automatically.
# Do NOT add manual [[redirects]] here — it will break the plugin's routing.
[[plugins]]
  package = "@netlify/plugin-nextjs"
